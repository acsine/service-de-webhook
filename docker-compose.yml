version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: webhook_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: webhook_service
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: webhook_redis
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: webhook_app
    depends_on:
      - db
      - redis
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@db:5432/webhook_service
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app

  worker:
    build: .
    container_name: webhook_worker
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@db:5432/webhook_service
      - REDIS_URL=redis://redis:6379/0
    entrypoint: [ "python", "-m", "app.workers" ]
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
